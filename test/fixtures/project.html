<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>Business analytics fixture</title>
    <script>
      window.__fixtureAnalyticsRequests = [];
      const fixtureFetch = window.fetch.bind(window);
      window.fetch = function (input, init) {
        const value = typeof input === "string" ? input : input && input.url;
        const url = new URL(value, window.location.href);
        if (url.pathname.startsWith("/jxpmo/rest/")) {
          window.__fixtureAnalyticsRequests.push({
            method: init && init.method || "GET",
            pathname: url.pathname,
            search: url.search,
            params: Object.fromEntries(url.searchParams.entries())
          });
        }
        return fixtureFetch(input, init);
      };
    </script>
    <script src="/fixture-runtime.js"></script>
  </head>

    <div id="page-wrapper">
      <div id="nav-col">
        <ul class="nav nav-pills nav-stacked" id="menunav">
          <li class="open active" appid="project:0101,jxoa">
            <a class="dropdown-toggle single" url="/project/ProjectInfoService/projectinDedaultHomePage" href="javascript:;">
              <i class="fa topmenu fa-file-text-o"></i>
              <span class="appname"> 首页 </span>
              <span class="msgcount" msgcount="project:0101,jxoa"></span>
              <i class="fa fa-angle-right drop-icon"></i>
            </a>
          </li>
          <li appid="project:1201,jxoa">
            <a class="dropdown-toggle single" url="/project/ModelFileService/modelfileListPage" href="javascript:;">
              <i class="fa topmenu fa-file-text-o"></i>
              <span class="appname"> 项目文档模板 </span>
              <span class="msgcount" msgcount="project:1201,jxoa"></span>
              <i class="fa fa-angle-right drop-icon"></i>
            </a>
          </li>
        </ul>
      </div>
      <div id="content-wrapper">
        <div id="app-wrapper">
          <main>
            <h1>项目管理</h1>
            <div id="ProjectInfogrid">Fixture project grid</div>
          </main>
        </div>
        <iframe id="app-wrapper-frame" hidden></iframe>
      </div>
    </div>
  </body>
</html>
